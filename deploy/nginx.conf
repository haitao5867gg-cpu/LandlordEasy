# Nginx 反向代理配置
# 部署时: cp deploy/nginx.conf /etc/nginx/sites-available/landlord-easy
#          ln -s /etc/nginx/sites-available/landlord-easy /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN.COM;  # 替换为实际域名

    # Let's Encrypt 验证(先配80端口,certbot会自动处理)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 强制跳转 HTTPS(证书申请成功后取消注释)
    # return 301 https://$host$request_uri;

    # === 临时: 证书下来之前先用 HTTP 直接反代 ===
    # 房东端 H5
    location / {
        root /opt/landlord-easy/apps/landlord-h5/dist;
        try_files $uri $uri/ /index.html;
    }

    # 租客端 /tenant 不带斜杠自动跳转
    location = /tenant {
        return 301 /tenant/;
    }

    # 租客端 H5(子路径 /tenant/)
    location /tenant/ {
        alias /opt/landlord-easy/apps/tenant-h5/dist/;
        index index.html;
        try_files $uri $uri/ /tenant/index.html;
    }

    # API 反代
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传文件静态服务
    location /uploads/ {
        alias /opt/landlord-easy/data/uploads/;
    }
}

